<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Age Calculator</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="container">
    <h1>🎂 Age Calculator</h1>

    <div class="form">
      <label for="birthday">Enter your date of birth</label>
      <input type="date" id="birthday" name="birthday">
      <button id="btn">Calculate Age</button>

      <p id="result"></p>
      <p id="breakdown"></p>
      <p id="zodiac"></p>
      <p id="planetary"></p>
      <p id="insights"></p>
      <p id="nextBirthday"></p>

      <div class="life-dashboard">
        <div class="progress-label">Life Progress</div>
        <div class="progress-bar-container">
          <div class="progress-bar" id="lifeProgress"></div>
        </div>
      </div>

      <!-- DAY IN HISTORY API RESULTS -->
      <div id="famousBirthdaysSection">
        <h3>📌 Famous People Born on Your Date</h3>
        <ul id="famousBirthdays"></ul>
      </div>

      <div id="historyEventsSection">
        <h3>🕰️ Historical Events on Your Date</h3>
        <ul id="historyEvents"></ul>
      </div>

      <button id="shareBtn">📤 Copy Results</button>
    </div>
  </div>

  <script src="assets/js/index.js"></script>
</body>
</html>
