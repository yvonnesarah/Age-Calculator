<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Age & Life Calculator</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="container">
    <h1>🎂 Age & Life Calculator</h1>

    <div class="form">
      <label for="birthday">Enter your date of birth</label>
      <input type="date" id="birthday" name="birthday">
      <button id="btn">Calculate Age</button>
      <button id="themeBtn">🌙 Toggle Theme</button>

      <p id="result"></p>
      <p id="breakdown"></p>
      <p id="zodiac"></p>
      <p id="planetary"></p>
      <p id="insights"></p>
      <p id="nextBirthday"></p>
      <div id="birthdayHighlight"></div>

      <div id="lifeStats"></div>

      <div class="life-dashboard">
        <div class="progress-label">Life Progress ⏳</div>
        <div class="progress-bar-container">
          <div class="progress-bar" id="lifeProgress"></div>
        </div>
      </div>

      <h3>🪐 Planetary Age Comparison</h3>
       <canvas id="planetChart" width="400" height="200"></canvas>

      <button id="shareBtn">📤 Copy Results</button>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="assets/js/index.js"></script>
</body>
</html>
